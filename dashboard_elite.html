<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Shinobi Interface - Mini Compact Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sharingan: #ff1e27;       /* Merah Akatsuki Terang Menyala */
            --sharingan-dark: #b20000;  /* Merah Darah Khas */
            --void: #020204;            /* Hitam Pekat Tsukuyomi */
            --panel-glass: rgba(15, 5, 8, 0.75); /* Kaca Gelap Tint Merah Tua */
            --shadow-glow: rgba(255, 30, 39, 0.25);
            --text-gray: #a38588;       /* Abu-abu kemerahan pudar */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--void);
            /* Efek background genjutsu merah-hitam melingkar */
            background-image: 
                radial-gradient(circle at center, rgba(255, 30, 39, 0.1) 0%, transparent 70%),
                radial-gradient(circle at center, #0d0406 0%, #020204 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            user-select: none;
        }

        /* TOMBOL KEMBALI CORE SYSTEM - SEKARANG TEMA MERAH AKATSUKI GLOW */
        .btn-back {
            position: fixed; 
            top: 25px; 
            left: 25px; 
            z-index: 10000; 
            padding: 12px 24px; 
            background: rgba(15, 5, 8, 0.6); 
            -webkit-backdrop-filter: blur(12px); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 30, 39, 0.3); 
            color: #ffffff; 
            border-radius: 30px; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 13px; 
            font-weight: 700; 
            letter-spacing: 2px; 
            cursor: pointer; 
            box-shadow: 0 0 15px rgba(255, 30, 39, 0.1), inset 0 0 10px rgba(255, 30, 39, 0.1); 
            transition: all 0.3s cubic-bezier(0.15, 0.85, 0.33, 1); 
            display: flex; 
            align-items: center; 
            gap: 10px;
            text-shadow: 0 0 8px var(--sharingan);
        }

        .btn-back:hover {
            background: rgba(255, 30, 39, 0.15); 
            border-color: var(--sharingan);
            box-shadow: 0 0 25px rgba(255, 30, 39, 0.4); 
            transform: translateY(-2px) scale(1.03);
            color: #ffffff;
        }

        /* CARD UTAMA: INTEGRASI KACA AKATSUKI GLASSMORPHISM */
        .dashboard-container {
            background: var(--panel-glass);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 30, 39, 0.12);
            padding: 25px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.85),
                        0 0 30px rgba(255, 30, 39, 0.15),
                        inset 0 1px 2px rgba(255, 30, 39, 0.15);
            position: relative;
            width: 720px;
            max-width: 95%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            animation: fadeInDashboard 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* AKSEN LINE GLOW ATAS NEON MERAH */
        .dashboard-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 15%;
            width: 70%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--sharingan), transparent);
            box-shadow: 0 0 12px var(--sharingan);
        }

        /* TAG LOKASI ATAS */
        .location-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #7a3a3d; /* Merah pudar gahar */
            margin-bottom: -18px;
            font-weight: 700;
            text-shadow: 0 0 5px rgba(255, 30, 39, 0.2);
        }

        /* SEKTOR JAM DIGITAL (MERAH GLOWING) */
        .time-box {
            font-family: 'Orbitron', sans-serif;
            font-size: 85px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 30, 39, 0.4),
                         0 0 25px var(--sharingan);
            letter-spacing: 2px;
            margin: 0;
            line-height: 0.95;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dots {
            color: var(--sharingan);
            text-shadow: 0 0 15px var(--sharingan);
            padding: 0 2px;
            animation: pulseBlink 1s infinite;
        }

        @keyframes pulseBlink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .ampm-box {
            font-family: 'Orbitron', sans-serif;
            font-size: 30px;
            font-weight: 900;
            color: var(--sharingan);
            text-shadow: 0 0 15px var(--sharingan);
            margin-left: 10px;
            align-self: flex-end;
            padding-bottom: 6px;
        }

        /* TANGGAL MEPEt */
        .date-box {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            margin-top: -12px;
            color: var(--text-gray);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 0 0 5px rgba(255, 30, 39, 0.1);
        }

        /* SEKAT TIPIS MERAH */
        .divider-line {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 30, 39, 0.25), transparent);
            margin: 2px 0;
        }

        /* SEKTOR RUNNING TEXT TIGHT MATCH */
        .ticker-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .ticker-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #7a3a3d;
            font-weight: 700;
            text-align: left;
            padding-left: 2px;
        }

        .ticker-container {
            width: 100%;
            background: #050203;
            border: 1px solid rgba(255, 30, 39, 0.25);
            border-radius: 8px;
            overflow: hidden;
            padding: 10px 0;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.9);
            display: flex;
        }

        .ticker-text {
            white-space: nowrap;
            padding-left: 100%;
            display: inline-block;
            font-family: 'Courier New', Courier, monospace;
            font-size: 17px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 30, 39, 0.5), 0 0 15px var(--sharingan);
            animation-name: loopMulusMurni;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            will-change: transform;
        }

        @keyframes loopMulusMurni {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        @keyframes fadeInDashboard {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<button onclick="kembaliKeHome()" class="btn-back">
    <span>⟵</span> CORE SYSTEM
</button>

<div class="dashboard-container">
    <div class="location-tag">MALAYSIA &bull; KUALA LUMPUR MYT</div>
    
    <div class="time-box">
        <span id="txt-jam">10</span><span class="dots">:</span><span id="txt-menit">00</span><span class="dots">:</span><span id="txt-detik">00</span>
        <span id="txt-ampm" class="ampm-box">AM</span>
    </div>
    
    <div class="date-box" id="txt-tanggal">MINGGU, 17 MEI 2026</div>

    <div class="divider-line"></div>

    <div class="ticker-wrapper">
        <div class="ticker-title">KATA KATA HARI INI</div>
        <div class="ticker-container">
            <div class="ticker-text">
                12 JAM DUDUK DISITU NGAPAIN AJA?... &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 
                ADA YANG BISA BANTU JELASKAN? &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 
                YANG GA ADA SECOND DAILY, NOMINAL, DAN CLOSING, SEMUANYA LEMBUR 2 JAM
            </div>
        </div>
    </div>
</div>

<script>
    function kembaliKeHome() {
        window.parent.resetPortal();
    }

    // ENGINE JAM 12 JAM MALAYSIA
    function refreshJamMalaysia() {
        const opsiWaktu = { timeZone: 'Asia/Kuala_Lumpur', hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' };
        const opsiTanggal = { timeZone: 'Asia/Kuala_Lumpur', weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };

        const kini = new Date();
        
        let stringWaktu = kini.toLocaleTimeString('id-ID', opsiWaktu);
        let stringTanggal = kini.toLocaleDateString('id-ID', opsiTanggal);

        let bagian = stringWaktu.split(' ');
        let angkaWaktu = bagian[0];
        let ampm = bagian[1] ? bagian[1] : '';

        let pecahan = angkaWaktu.split(/[\.:]/);

        if (pecahan.length === 3) {
            document.getElementById('txt-jam').innerText = pecahan[0];
            document.getElementById('txt-menit').innerText = pecahan[1];
            document.getElementById('txt-detik').innerText = pecahan[2];
        }

        document.getElementById('txt-ampm').innerText = ampm.toUpperCase();
        document.getElementById('txt-tanggal').innerText = stringTanggal;
    }

    // ENGINE AUTO RUNNING TEXT
    function rapihkanKecepatanTeks() {
        const teks = document.querySelector('.ticker-text');
        if (teks) {
            const lebarTeksAsli = teks.offsetWidth;
            const setelanKecepatan = 80;
            const durasiFinal = lebarTeksAsli / setelanKecepatan;
            teks.style.animationDuration = `${durasiFinal}s`;
        }
    }

    setInterval(refreshJamMalaysia, 1000);
    refreshJamMalaysia();

    window.addEventListener('load', rapihkanKecepatanTeks);
    window.addEventListener('resize', rapihkanKecepatanTeks);
</script>
</body>
</html>
