<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pusat - Cyber Shinobi Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght=700;900&family=Plus+Jakarta+Sans:wght=400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #030408;
            --panel-glass: rgba(6, 9, 22, 0.55);
            --neon-red: #ff3838;
            --neon-cyan: #00f3ff;
            --neon-purple: #b538ff;
            --neon-orange: #ff9f43;
            --neon-blue: #00a2ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(181, 56, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 243, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at center, #070913 0%, #020306 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            perspective: 1000px;
            padding: 20px;
        }

        /* CONTAINER UTAMA - MENGIKUTI UKURAN LAYAR secara OTOMATIS */
        .central-container {
            width: 100%;
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            text-align: center;
            z-index: 10;
            animation: popInContainer 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* HEADER BRAND */
        .portal-brand {
            font-family: 'Orbitron', sans-serif;
            font-size: calc(24px + 2vw); /* Ukuran teks fleksibel ikut layar */
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #ffffff 30%, var(--neon-cyan));
         -webkit-background-clip: text;
    background-clip: text; /* <--- Tambahkan baris standar ini di bawahnya */
    -webkit-text-fill-color: transparent;            text-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .portal-subtitle {
            font-family: 'Orbitron', sans-serif;
            font-size: calc(10px + 0.3vw);
            color: #4b586e;
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* GRID RESPONSIF TOTAL */
        .menu-grid {
            display: grid;
            /* Membuat kolom otomatis membesar/mengecil sesuai lebar layar */
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
            width: 100%;
        }

        /* KARTU MENU GLASSMORPHISM */
        .menu-card {
            background: var(--panel-glass);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 40px 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: relative; /* Wajib sebagai jangkar posisi gagak */
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.15, 0.85, 0.33, 1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-decoration: none;
            z-index: 1; /* Supaya teks & ikon berada di lapisan atas */
        }
/* EFEK MUNCUL GAGAK ITACHI DI DALAM KOTAK SAAT DI-HOVER */
        .menu-card::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.6); /* Mulai dari ukuran agak kecil */
            width: 100%;
            height: 100%;
            
            /* URL GAMBAR SILUET GAGAK TRANSPARAN */
            background-image: url('gagak.png');
            
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            
            /* Mengubah gambar jadi siluet hitam pekat + aura ungu genjutsu */
            filter: brightness(0) drop-shadow(0 0 15px rgba(181, 56, 255, 0.6));
            
            opacity: 0; /* Normalnya tersembunyi */
            z-index: -1; /* Berada di belakang ikon dan tulisan menu */
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Efek pop-out membal */
            pointer-events: none;
        }

        /* TRIGGER SAAT KOTAK MENU DI-HOVER */
        .menu-card:hover::after {
            opacity: 0.25; /* Transparansi gagak biar ikon & teks di depannya tetap kelihatan jelas */
            transform: translate(-50%, -50%) scale(1.1); /* Gagak mengepak membesar */
        }
                .menu-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.06), transparent);
            transform: skewX(-25deg);
            transition: 0.7s;
        }
        .menu-card:hover::before { left: 150%; }

        .menu-card i {
            font-size: 48px;
            color: #525f7a;
            transition: all 0.4s ease;
        }

        .menu-card span {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #8c99b4;
            transition: all 0.4s ease;
        }

        /* EFEK HOVER INDIVIDU */
        .menu-card:hover {
            transform: translateY(-8px) scale(1.02) rotateX(3deg);
            background: rgba(10, 14, 31, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .card-red:hover { box-shadow: 0 20px 40px rgba(255, 56, 56, 0.22); }
        .card-red:hover i { color: var(--neon-red) !important; filter: drop-shadow(0 0 10px var(--neon-red)); }
        .card-red:hover span { color: #fff; text-shadow: 0 0 8px var(--neon-red); }

        .card-cyan:hover { box-shadow: 0 20px 40px rgba(0, 243, 255, 0.22); }
        .card-cyan:hover i { color: var(--neon-cyan) !important; filter: drop-shadow(0 0 10px var(--neon-cyan)); }
        .card-cyan:hover span { color: #fff; text-shadow: 0 0 8px var(--neon-cyan); }

        .card-purple:hover { box-shadow: 0 20px 40px rgba(181, 56, 255, 0.22); }
        .card-purple:hover i { color: var(--neon-purple) !important; filter: drop-shadow(0 0 10px var(--neon-purple)); }
        .card-purple:hover span { color: #fff; text-shadow: 0 0 8px var(--neon-purple); }

        .card-orange:hover { box-shadow: 0 20px 40px rgba(255, 159, 67, 0.22); }
        .card-orange:hover i { color: var(--neon-orange) !important; filter: drop-shadow(0 0 10px var(--neon-orange)); }
        .card-orange:hover span { color: #fff; text-shadow: 0 0 8px var(--neon-orange); }

        .card-blue:hover { box-shadow: 0 20px 40px rgba(0, 162, 255, 0.22); }
        .card-blue:hover i { color: var(--neon-blue) !important; filter: drop-shadow(0 0 10px var(--neon-blue)); }
        .card-blue:hover span { color: #fff; text-shadow: 0 0 8px var(--neon-blue); }

        .central-footer {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: #313b4d;
            letter-spacing: 2px;
        }

        /* IFRAME FULLSCREEN */
        .content-frame {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            border: none;
            z-index: 9999;
            background: #020306;
            transition: all 0.5s ease-in-out;
            transform: scale(0.97);
        }

        /* SUPER KEREN MARTIS LOADING OVERLAY */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #020306;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .loading-overlay.show { opacity: 1; pointer-events: auto; }

        /* MARTIS GLITCH NEON TEXT EFFECT */
        .martis-loader-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 12px;
            margin-bottom: 20px;
            text-transform: uppercase;
            position: relative;
            text-shadow: 0 0 10px var(--neon-purple), 0 0 20px var(--neon-purple), 0 0 40px var(--neon-purple);
            animation: martisGlow 2s infinite alternate, martisGlitch 1.5s infinite;
        }

        .loading-log { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 11px; 
            color: #525f7a; 
            letter-spacing: 2px; 
            margin-bottom: 25px; 
            height: 15px; 
        }

        .progress-container { width: 300px; max-width: 80%; background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(181, 56, 255, 0.2); padding: 4px; border-radius: 30px; }
        .progress-bar { height: 5px; width: 0%; background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan)); border-radius: 30px; box-shadow: 0 0 15px var(--neon-purple); }

        /* ANIMASI EFEK NYALA MARTIS */
        @keyframes martisGlow {
            0% { text-shadow: 0 0 10px var(--neon-purple), 0 0 20px var(--neon-purple); color: #fff; }
            100% { text-shadow: 0 0 20px var(--neon-red), 0 0 40px var(--neon-red), 0 0 60px var(--neon-purple); color: #f5f5f5; }
        }

        @keyframes martisGlitch {
            0%, 100% { transform: skew(0deg); }
            20% { transform: skew(-3deg); }
            23% { transform: skew(4deg); }
            25% { opacity: 0.9; }
            26% { opacity: 1; }
            70% { transform: skew(1deg); }
            72% { transform: skew(-4deg); }
        }

        @keyframes popInContainer {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

    <div class="central-container" id="mainMenuLayout">
        <div class="portal-brand">Core System</div>
        <div class="portal-subtitle">Cyber Shinobi Portal v2.5</div>
        
        <div class="menu-grid">
            <div class="menu-card card-red" onclick="bukaProyek('dashboard_elite.html', 'Shinobi Interface')">
                <i class="material-icons">dashboard</i>
                <span>Shinobi Interface</span>
            </div>
            
            <div class="menu-card card-cyan" onclick="bukaProyek('ngetik.html', 'Martis Typing')">
                <i class="material-icons">keyboard</i>
                <span>Martis Typing</span>
            </div>
            
            <div class="menu-card card-purple" onclick="bukaProyek('Martispanel.html', 'Martis Panel')">
                <i class="material-icons">verified_user</i>
                <span>Martis Panel</span>
            </div>
            
            <div class="menu-card card-orange" onclick="bukaProyek('sharinggan.html', 'Tsukuyomi')">
                <i class="material-icons">remove_red_eye</i>
                <span>Tsukuyomi Genjutsu</span>
            </div>

            <a href="https://t.me/UsernameKamu" target="_blank" class="menu-card card-blue">
                <i class="material-icons">headset_mic</i>
                <span>Shinobi Support</span>
            </a>
        </div>

        <div class="central-footer">
            SYSTEM STATUS: ONLINE // SECURE PROTOCOL ACTIVE
        </div>
    </div>

    <iframe src="" id="portalFrame" class="content-frame" style="display: none; opacity: 0;"></iframe>

    <div class="loading-overlay" id="loadingScreen">
        <div class="martis-loader-text">MARTIS</div>
        <div class="loading-log" id="loadingLog">Menghubungkan jaringan core...</div>
        <div class="progress-container">
            <div class="progress-bar" id="loadBar"></div>
        </div>
    </div>

    <script>
        // Log Berjalan saat masuk/keluar menu
        const logsMasuk = [
            "Bypassing mainframe firewall...",
            "Decrypting secure shinobi nodes...",
            "Injecting neon plasma protocol...",
            "ACCESS GRANTED. OVERRIDING SYSTEM!"
        ];

        const logsKeluar = [
            "Disconnecting current node...",
            "Cleaning secure data tracks...",
            "Rebuilding Core System UI...",
            "WELCOME BACK TO CENTRAL SYSTEM!"
        ];

        function bukaProyek(namaFile, namaMenu) {
            jalankanLoadingAnimation(logsMasuk, () => {
                const iframe = document.getElementById('portalFrame');
                document.getElementById('mainMenuLayout').style.display = 'none';
                iframe.style.display = 'block';
                iframe.src = namaFile;
                setTimeout(() => { 
                    iframe.style.opacity = '1'; 
                    iframe.style.transform = 'scale(1)'; 
                }, 50);
                localStorage.setItem('halamanTerakhir', namaFile);
            });
        }

        // FUNGSI UTAMA: UNTUK RESET KEMBALI KE HOME DENGAN LOADING MARTIS
        function resetPortal() {
            localStorage.removeItem('halamanTerakhir');
            
            // Tampilkan loading screen dulu saat proses kembali
            const iframe = document.getElementById('portalFrame');
            iframe.style.opacity = '0';
            iframe.style.transform = 'scale(0.97)';
            
            setTimeout(() => {
                iframe.style.display = 'none';
                jalankanLoadingAnimation(logsKeluar, () => {
                    location.reload(); // Memuat ulang halaman utama ke menu tengah
                });
            }, 300);
        }

        // Mesin Penggerak Animasi Progress Bar Loading
        function jalankanLoadingAnimation(databaseLog, callbackSelesai) {
            const loadingScreen = document.getElementById('loadingScreen');
            const loadBar = document.getElementById('loadBar');
            const loadingLog = document.getElementById('loadingLog');

            loadBar.style.width = "0%";
            loadingLog.innerText = databaseLog[0];
            loadingScreen.classList.add('show');

            let persen = 0;
            let intervalLoading = setInterval(() => {
                persen += Math.floor(Math.random() * 8) + 4;
                
                if (persen >= 100) {
                    persen = 100;
                    clearInterval(intervalLoading);
                    loadBar.style.width = "100%";
                    loadingLog.innerText = databaseLog[3];

                    setTimeout(() => {
                        loadingScreen.classList.remove('show');
                        callbackSelesai();
                    }, 400);
                } else {
                    loadBar.style.width = persen + "%";
                    if (persen > 25 && persen <= 55) loadingLog.innerText = databaseLog[1];
                    else if (persen > 55 && persen <= 85) loadingLog.innerText = databaseLog[2];
                }
            }, 25);
        }

        window.onload = function() {
            const halamanTerakhir = localStorage.getItem('halamanTerakhir');
            if (halamanTerakhir) {
                const iframe = document.getElementById('portalFrame');
                document.getElementById('mainMenuLayout').style.display = 'none';
                iframe.style.display = 'block';
                iframe.style.opacity = '1';
                iframe.style.transform = 'scale(1)';
                iframe.src = halamanTerakhir;
            }
        };
    </script>
</body>
</html>
